<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOT Mining Store — Configuración de cuenta</title>
<style>
  :root { --bg:#0e1117; --card:#161b22; --bd:#30363d; --tx:#e6edf3; --mut:#8b949e;
          --ok:#2ea043; --warn:#d29922; --err:#f85149; --acc:#388bfd; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--tx);
         font-family:system-ui,Segoe UI,Roboto,sans-serif; padding:24px; }
  .wrap { max-width:720px; margin:0 auto; }
  h1 { font-size:20px; margin:0 0 4px; }
  .sub { color:var(--mut); font-size:13px; margin-bottom:20px; }
  .card { background:var(--card); border:1px solid var(--bd); border-radius:10px;
          padding:18px; margin-bottom:16px; }
  label { display:block; font-size:13px; color:var(--mut); margin:10px 0 4px; }
  input, select { width:100%; padding:9px 11px; background:#0d1117; color:var(--tx);
                  border:1px solid var(--bd); border-radius:7px; font-size:14px; }
  .row { display:flex; gap:12px; } .row > div { flex:1; }
  .chk { display:flex; align-items:center; gap:8px; margin-top:12px; }
  .chk input { width:auto; }
  button { padding:9px 16px; border:none; border-radius:7px; font-size:14px;
           cursor:pointer; font-weight:600; }
  .btn-test { background:#21262d; color:var(--tx); border:1px solid var(--bd); }
  .btn-save { background:var(--acc); color:#fff; }
  .btn-act  { background:#21262d; color:var(--tx); border:1px solid var(--bd);
              padding:5px 12px; font-size:12px; }
  .actions { display:flex; gap:10px; margin-top:18px; }
  .msg { margin-top:14px; padding:10px 12px; border-radius:7px; font-size:13px; display:none; }
  .msg.ok  { background:rgba(46,160,67,.15); color:#56d364; display:block; }
  .msg.err { background:rgba(248,81,73,.15); color:#ff7b72; display:block; }
  .acct { display:flex; justify-content:space-between; align-items:center;
          padding:10px 12px; border:1px solid var(--bd); border-radius:7px; margin-bottom:8px; }
  .acct.active { border-color:var(--ok); }
  .badge { font-size:11px; padding:2px 8px; border-radius:20px; background:#21262d; color:var(--mut); }
  .badge.live { background:rgba(248,81,73,.2); color:#ff7b72; }
  .badge.on { background:rgba(46,160,67,.2); color:#56d364; }
  .status { font-size:12px; color:var(--mut); }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>⚙️ BOT Mining Store — Configuración de cuenta</h1>
  <div class="sub">Acepta solo cuentas <b>CFT</b> (Crypto Fund Trader / Bybit) y
    <b>ADN</b> (ADN Broker / MetaTrader 5). <span id="botStatus"></span></div>

  <div class="card">
    <h3 style="margin:0 0 4px">Agregar / actualizar cuenta</h3>
    <label>Tipo de cuenta</label>
    <select id="type" onchange="renderFields()"></select>

    <label>Nombre (referencia)</label>
    <input id="name" placeholder="Ej: CFT principal / ADN funded">

    <div id="fields"></div>

    <div class="chk"><input type="checkbox" id="demo"><label for="demo" style="margin:0">Cuenta demo / testnet</label></div>

    <div class="actions">
      <button class="btn-test" onclick="testConn()">Probar conexión</button>
      <button class="btn-save" onclick="save()">Guardar y activar</button>
    </div>
    <div id="msg" class="msg"></div>
  </div>

  <div class="card">
    <h3 style="margin:0 0 12px">Cuentas guardadas</h3>
    <div id="list"><span class="status">Cargando…</span></div>
  </div>
</div>

<script>
const FIELD_LABELS = {
  api_key:"API Key", api_secret:"API Secret",
  login:"Login (número)", password:"Password", server:"Servidor"
};
let TYPES = {};

async function api(path, method="GET", body=null){
  const opt = { method, headers:{"Content-Type":"application/json"} };
  if (body) opt.body = JSON.stringify(body);
  const r = await fetch(path, opt);
  return r.json();
}

function renderFields(){
  const t = document.getElementById("type").value;
  const fields = (TYPES[t]||{}).fields || [];
  let html = fields.map(f=>{
    const type = f==="password" ? "password" : (f==="login" ? "number" : "text");
    return `<label>${FIELD_LABELS[f]||f}</label>
            <input id="f_${f}" type="${type}" autocomplete="off">`;
  }).join("");
  if (t === "ADN"){
    html += `<label>Ruta terminal MT5 (opcional — solo si falla la autodetección)</label>
             <input id="f_path" type="text" autocomplete="off"
                    placeholder="C:\\Program Files\\MetaTrader 5\\terminal64.exe">`;
  }
  document.getElementById("fields").innerHTML = html;
}

function collect(){
  const t = document.getElementById("type").value;
  const cfg = { type:t, name:document.getElementById("name").value,
                demo:document.getElementById("demo").checked };
  (TYPES[t].fields||[]).forEach(f=>{
    let v = document.getElementById("f_"+f).value;
    if (f==="login") v = parseInt(v||"0");
    cfg[f] = v;
  });
  const pathEl = document.getElementById("f_path");
  if (pathEl && pathEl.value.trim()) cfg.path = pathEl.value.trim();
  return cfg;
}

function showMsg(ok, text){
  const m = document.getElementById("msg");
  m.className = "msg " + (ok?"ok":"err");
  m.textContent = (ok?"✓ ":"✗ ") + text;
}

async function testConn(){
  showMsg(true, "Probando…");
  const r = await api("/api/test","POST",collect());
  showMsg(r.ok, r.message);
}

async function save(){
  const r = await api("/api/save","POST",collect());
  showMsg(r.ok, r.message);
  if (r.ok) refresh();
}

async function activate(id){
  const r = await api("/api/activate","POST",{id});
  refresh();
}

async function refresh(){
  const s = await api("/api/state");
  TYPES = s.types;
  // selector de tipos
  const sel = document.getElementById("type");
  if (!sel.options.length){
    sel.innerHTML = Object.entries(TYPES).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join("");
    renderFields();
  }
  // estado del bot
  document.getElementById("botStatus").innerHTML =
    `<span class="dot" style="background:${s.bot_running?'#2ea043':'#8b949e'}"></span>` +
    (s.bot_running ? "Bot corriendo" : "Bot detenido / sin cuenta");
  // lista de cuentas
  const acc = s.accounts || {};
  const list = document.getElementById("list");
  if (!Object.keys(acc).length){ list.innerHTML = '<span class="status">No hay cuentas. Agrega una arriba.</span>'; return; }
  list.innerHTML = Object.entries(acc).map(([id,c])=>{
    const isActive = id===s.active;
    return `<div class="acct ${isActive?'active':''}">
      <div>
        <b>${c.name||id}</b> <span class="badge">${c.type}</span>
        <span class="badge ${c.demo?'':'live'}">${c.demo?'DEMO':'LIVE'}</span>
        ${isActive?'<span class="badge on">ACTIVA</span>':''}
        <div class="status">${(c.symbols||[]).join(', ')}</div>
      </div>
      ${isActive?'':`<button class="btn-act" onclick="activate('${id}')">Activar</button>`}
    </div>`;
  }).join("");
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
